server.port=8080

spring.application.name=CityLibrarySystem

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/CityLibrary?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&connectTimeout=30000&socketTimeout=60000
spring.datasource.username=root
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.connection-timeout=60000

# MyBatis-Plus Configuration
mybatis-plus.mapper-locations=classpath:mapper/**/*.xml
mybatis-plus.type-aliases-package=com.example.demo.model
mybatis-plus.configuration.map-underscore-to-camel-case=true

# JWT Configuration
jwt.secret=your-very-long-secret-key-that-is-at-least-64-bytes-long-for-hs512-algorithm-security
jwt.expiration-ms=86400000

# SQL Init
spring.sql.init.mode=never

# File Upload Configuration
upload.path=uploads

# Spring Multipart File Upload Size Limits
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.file-size-threshold=0

# Logging Configuration (using logback-spring.xml)
logging.file.path=logs
logging.file.name=spring.log
